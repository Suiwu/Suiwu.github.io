function simulate(bars,i,target=.008,stop=.009,maxBars=8){const ep=bars[i].close;for(let j=i+1;j<Math.min(bars.length,i+1+maxBars);j++){const b=bars[j];const hitT=b.high>=ep*(1+target),hitS=b.low<=ep*(1-stop);if(hitT&&hitS)return {r:-stop,why:'both'};if(hitS)return {r:-stop,why:'stop'};if(hitT)return {r:target,why:'target'};}const j=Math.min(bars.length-1,i+maxBars);return {r:bars[j].close/ep-1,why:'time'}}
load().then(p=>{const ks=p.data.klines.map(s=>{const a=s.split(',');const [d,t]=a[0].split(' ');return {d,t,m:minOf(t),o:+a[1],c:+a[2],h:+a[3],l:+a[4],v:+a[5],amt:+a[6]}});const by={};ks.forEach(x=>(by[x.d]??=[]).push(x));const dates=Object.keys(by).sort();const daily=[];let prev=null;for(const d of dates){const b=by[d];if(prev==null)prev=b[0].o;let cv=0,cpv=0;for(const x of b){const tp=(x.h+x.l+x.c)/3;cv+=x.v;cpv+=tp*x.v;x.vwap=cpv/cv;x.ret=x.c/prev-1}const hi=Math.max(...b.map(x=>x.h)),lo=Math.min(...b.map(x=>x.l));const hiBar=b.find(x=>x.h===hi),loBar=b.find(x=>x.l===lo);daily.push({d,prev,b,open:b[0].o,close:b.at(-1).c,ret:b.at(-1).c/prev-1,gap:b[0].o/prev-1,high:hi,low:lo,hiT:hiBar.t,loT:loBar.t,range:hi/lo-1,closePos:(b.at(-1).c-lo)/(hi-lo||1)});prev=b.at(-1).c}
const jun=daily.filter(x=>x.d>='2026-06-01');const ups=jun.filter(x=>x.ret>0);const stats={sample:{days:jun.length,upDays:ups.length,upRate:ups.length/jun.length,dates:jun.map(x=>x.d)},days:jun.map(x=>({date:x.d,ret:x.ret,gap:x.gap,range:x.range,lowTime:x.loT,highTime:x.hiT,closePos:x.closePos,bars:x.b.length}))};

stats.upPath=clocks.map(m=>{const xs=[];for(const d of ups){const z=d.b.find(x=>x.m===m);if(z)xs.push(z.c/d.open-1)}return {time:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'),n:xs.length,mean:mean(xs),median:med(xs),positive:xs.length?xs.filter(x=>x>0).length/xs.length:null}}).filter(x=>x.n);
stats.forward40=clocks.map(m=>{const rs=[];for(const d of ups){const i=d.b.findIndex(x=>x.m===m);if(i>=0&&i<d.b.length-1)rs.push(simulate(d.b,i).r)}return {time:String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'),n:rs.length,win:rs.length?rs.filter(x=>x>0).length/rs.length:null,avg:mean(rs),median:med(rs)}}).filter(x=>x.n>=3);
const signals=[];for(const d of ups){const b=d.b;for(let i=4;i<b.length-1;i++){const x=b[i],p=b[i-1],p2=b[i-2];const sessionOK=(x.m>=585&&x.m<=660)||(x.m>=790&&x.m<=835);if(!sessionOK)continue;const lastHigh=Math.max(...b.slice(Math.max(0,i-4),i+1).map(z=>z.h));const pull= x.c/lastHigh-1;const turn=x.c>p.c&&p.c<=p2.c;const near=x.c<=x.vwap*1.003;const aboveOpen=x.c>=d.open*.995;if(pull<=-.0045&&turn&&near&&aboveOpen){const sim=simulate(b,i);signals.push({date:d.d,time:x.t,entry:x.c,vwap:x.vwap,pullback:pull,result:sim.r,why:sim.why});break}}}
stats.signal={count:signals.length,winRate:signals.length?signals.filter(x=>x.result>0).length/signals.length:null,avg:mean(signals.map(x=>x.result)),items:signals};

}).catch(e=>OUT.textContent='ERROR '+e.stack);
